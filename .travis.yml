language: cpp
dist: bionic

matrix:
  include:
    - os: linux
      addons:
        apt:
          sources:
            - ubuntu-toolchain-r-test
          packages:
            - g++-7
      env:
         - MATRIX_EVAL="CC=gcc-7 && CXX=g++-7"

compiler:
  - gcc

before_install:
  - eval "${MATRIX_EVAL}"
  - pip install --user cpp-coveralls
  - sudo apt install -y gcc cmake lcov ggcov build-essential libboost-all-dev git-core doxygen

before_script:
  - mkdir build
  - cd build

script:
  - cmake ..
  - make cpp-computing-fundamentals cpp-computing-fundamentals-coverage

after_success:
  - coveralls --exclude lib --exclude tests --gcov-options '\-lp'

addons:
  apt:
    update: true